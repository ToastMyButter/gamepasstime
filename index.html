<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

.container{
background:#1c1c1c;
padding:40px;
border-radius:15px;
width:320px;
box-shadow:0 0 20px rgba(255,255,255,0.2);
position:relative;
}

h1{
margin-bottom:25px;
}

button{
padding:12px 20px;
font-size:16px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
position:relative;
}

.yes{
background:#4CAF50;
color:white;
transition:transform 0.2s;
}

.no{
background:#e53935;
color:white;
position:absolute;
}

.hidden{
display:none;
}

/* hearts animation */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:floatUp 3s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-200px);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<div id="questionPage">
<h1 id="questionText">Do you love me?</h1>

<button id="yesBtn" class="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="noBtn" class="no">No 😢</button>

</div>

<div id="lovePage" class="hidden">
<h1>I love you too Sandra ❤️</h1>
<p>You make my world better every day.</p>
<p>I'm lucky to have you.</p>
</div>

<audio id="loveSong">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c7a7c1b4a.mp3?filename=romantic-background-11269.mp3" type="audio/mpeg">
</audio>

</div>

<script>

let noCount = 0;
let yesSize = 1;

const questionText = document.getElementById("questionText");
const questionPage = document.getElementById("questionPage");
const lovePage = document.getElementById("lovePage");

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

const song = document.getElementById("loveSong");

/* NO button runs away */

document.addEventListener("mousemove", (e)=>{

const rect = noBtn.getBoundingClientRect();

const distanceX = Math.abs(e.clientX - rect.left);
const distanceY = Math.abs(e.clientY - rect.top);

if(distanceX < 80 && distanceY < 80){

const x = Math.random() * 250;
const y = Math.random() * 200;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

});

/* YES clicked */

function yesClicked(){

questionPage.style.display="none";
lovePage.style.display="block";

song.play().catch(()=>{});

/* hearts animation */

for(let i=0;i<30;i++){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=(window.innerHeight-50)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

}

/* NO clicked logic */

noBtn.addEventListener("click",()=>{

noCount++;

yesSize += 0.3;
yesBtn.style.transform="scale("+yesSize+")";

if(noCount===1){
questionText.textContent="Are you sure? 🥲";
}

else if(noCount===2){
questionText.textContent="Really sure??";
}

else if(noCount===3){
questionText.textContent="Last chance...";
}

else if(noCount===4){
questionText.textContent="Sandra this is getting suspicious 😭";
}

else{
questionText.textContent="Okay now you HAVE to press yes.";
}

});

</script>

</body>
</html>
