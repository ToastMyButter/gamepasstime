<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totally Legit Portal</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: 'Courier New', monospace;
  color: #00ff00;
  text-align: center;
}

.container {
  background: black;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 25px #00ff00;
  border: 1px solid #00ff00;
  width: 350px;
}

input, button {
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #00ff00;
  background: black;
  color: #00ff00;
  text-align: center;
  margin-bottom: 10px;
  width: 90%;
}

button {
  cursor: pointer;
}

.section {
  display: none;
}

#mainPage {
  display: block; /* MAIN PAGE ALWAYS FIRST */
}

#gameKey {
  margin-top: 15px;
  font-size: 18px;
  letter-spacing: 2px;
}

#roastMessage {
  margin-top: 15px;
  font-size: 16px;
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<!-- MAIN PAGE -->
<div id="mainPage" class="section">
  <h1>ENTER SSS</h1>
  <input type="text" id="sssInput" placeholder="> Enter SSS">
  <input type="text" id="phoneInput" placeholder="> Fone #">
  <button onclick="startSequence()">Submit</button>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="section">
  <p>Accessing ultra secure database...</p>
</div>

<!-- FINAL PAGE -->
<div id="videoContainer" class="section">
  <h2>Here's your totally real free game pass</h2>
  <div id="gameKey"></div>
  <div id="roastMessage"></div>
  <p>Thank you BUNS 😼</p>

  <img 
    src="https://media.tenor.com/5BVp6XKzE8kAAAAC/cat-laughing.gif"
    style="width:300px; border-radius:12px; margin-top:10px; display:block; margin-left:auto; margin-right:auto;"
  >

  <br><br>
  <button onclick="goBack()">Back to Main Page</button>
</div>

<audio id="evilLaugh">
  <source src="https://www.soundjay.com/human/evil-laugh-01.mp3" type="audio/mpeg">
</audio>

</div>

<script>
const mainPage = document.getElementById("mainPage");
const loadingScreen = document.getElementById("loadingScreen");
const videoContainer = document.getElementById("videoContainer");
const gameKeyDisplay = document.getElementById("gameKey");
const roastMessage = document.getElementById("roastMessage");
const evilLaugh = document.getElementById("evilLaugh");

const roasts = [
  "Bro really typed it 😭",
  "You thought this was real??",
  "That SSS looked suspiciously fake 💀",
  "Nice try hacker man.",
  "We almost believed you.",
  "System error: User too gullible.",
  "Access denied... just kidding 😂",
  "FBI watching you through the toaster rn.",
  "You passed the vibe check somehow.",
  "Congratulations, you played yourself."
];

function generateGameKey() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let key = "";
  for (let i = 0; i < 25; i++) {
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return key.match(/.{1,5}/g).join("-");
}

function showSection(section) {
  mainPage.style.display = "none";
  loadingScreen.style.display = "none";
  videoContainer.style.display = "none";
  section.style.display = "block";
}

function startSequence() {
  if (document.getElementById("sssInput").value.trim() !== "") {

    // Play laugh
    evilLaugh.currentTime = 0;
    evilLaugh.play().catch(() => {});

    showSection(loadingScreen);

    setTimeout(() => {
      gameKeyDisplay.textContent = generateGameKey();
      roastMessage.textContent =
        roasts[Math.floor(Math.random() * roasts.length)];
      showSection(videoContainer);
    }, 3000);
  }
}

function goBack() {
  showSection(mainPage);
  document.getElementById("sssInput").value = "";
  document.getElementById("phoneInput").value = "";
  roastMessage.textContent = "";
}
</script>

</body>
</html>
